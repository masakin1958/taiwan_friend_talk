<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>台灣朋友 (Taiwan Friend) - GitHub Secure Edition</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
</head>
<body class="bg-stone-50 overflow-hidden text-stone-800">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useRef } = React;

    // --- アイコン ---
    const MicIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>;
    const StopIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/></svg>;
    const SendIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>;
    const PlayIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
    const VolumeIcon = () => <svg className="animate-pulse" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>;
    const SpinnerIcon = () => <svg className="animate-spin" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;

    function App() {
      // 鍵をブラウザに保存するための処理（GitHubによる鍵無効化を防ぐ）
      const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key_v2') || "");
      const [tempKey, setTempKey] = useState("");
      
      const [messages, setMessages] = useState([{
        id: 1, role: 'model',
        reply: '你好！我是あなたの台湾人パートナーです。おしゃべりしましょう！',
        replyPinyin: 'Nǐ hǎo! Wǒ shì nǐ de Táiwān péngyǒu. Wǒmen lái liáotiān ba!',
        translation: 'こんにちは！私はあなたの台湾の友達です。おしゃべりしましょう！'
      }]);
      const [inputText, setInputText] = useState("");
      const [isRecording, setIsRecording] = useState(false);
      const [isLoading, setIsLoading] = useState(false);
      const [errorMessage, setErrorMessage] = useState("");
      const [audioState, setAudioState] = useState({ id: null, status: 'idle' });

      const recognitionRef = useRef(null);
      const messagesEndRef = useRef(null);

      // --- キー設定処理 ---
      const handleKeySave = () => {
        if (tempKey.trim().startsWith("AIza")) {
          const cleanKey = tempKey.trim();
          localStorage.setItem('gemini_api_key_v2', cleanKey);
          setApiKey(cleanKey);
        } else {
          showError("有効なAPIキーを入力してください。");
        }
      };

      const handleKeyReset = () => {
        if(confirm("APIキーを消去してログアウトしますか？")) {
          localStorage.removeItem('gemini_api_key_v2');
          setApiKey("");
        }
      };

      // --- 音声認識の初期化 ---
      useEffect(() => {
        if (apiKey && ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
          const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
          recognitionRef.current = new SpeechRecognition();
          recognitionRef.current.continuous = false;
          recognitionRef.current.lang = "zh-TW";
          recognitionRef.current.onresult = (e) => setInputText(prev => prev + e.results[0][0].transcript);
          recognitionRef.current.onend = () => setIsRecording(false);
          recognitionRef.current.onerror = () => setIsRecording(false);
        }
      }, [apiKey]);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages, isLoading]);

      const showError = (msg) => {
        setErrorMessage(msg);
        setTimeout(() => setErrorMessage(""), 5000);
      };

      const handleSend = async () => {
        if (!inputText.trim() || isLoading) return;
        const text = inputText.trim();
        const userMsg = { id: Date.now(), role: 'user', rawText: text };
        setMessages(prev => [...prev, userMsg]);
        setInputText("");
        setIsLoading(true);

        try {
          const res = await callGemini(text, messages);
          setMessages(prev => prev.map(m => m.id === userMsg.id ? {...m, ...res.correction} : m));
          setMessages(prev => [...prev, { id: Date.now()+1, role: 'model', ...res.reply }]);
        } catch (e) {
          showError("通信エラー。APIキーを確認してください。");
          setMessages(prev => prev.filter(m => m.id !== userMsg.id));
          setInputText(text);
        } finally {
          setIsLoading(false);
        }
      };

      const callGemini = async (text, history) => {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
        const sys = "台湾人の言語パートナー。繁体字で返答し文を添削してください。JSONで返してください。";
        const payload = {
          contents: history.filter(m => m.id !== 1).map(m => ({
            role: m.role, parts: [{ text: m.role==='user' ? m.rawText : m.reply }]
          })).concat([{ role: 'user', parts: [{ text }] }]),
          systemInstruction: { parts: [{ text: sys }] },
          generationConfig: {
            responseMimeType: "application/json",
            responseSchema: {
              type: "OBJECT",
              properties: {
                correction: { type: "OBJECT", properties: { correctedText: {type:"STRING"}, correctedPinyin: {type:"STRING"} } },
                reply: { type: "OBJECT", properties: { reply: {type:"STRING"}, replyPinyin: {type:"STRING"}, translation: {type:"STRING"} } }
              }
            }
          }
        };
        const r = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
        const d = await r.json();
        return JSON.parse(d.candidates[0].content.parts[0].text);
      };

      // --- 読み上げ機能（Chromeバグ対策・Perplexity連携版） ---
      const speak = (msgId, text) => {
        if (!('speechSynthesis' in window)) return;
        window.speechSynthesis.cancel();
        window.speechSynthesis.resume(); 
        
        setAudioState({ id: msgId, status: 'playing' });
        const ut = new SpeechSynthesisUtterance(text);
        const voices = window.speechSynthesis.getVoices();
        const v = voices.find(v => v.lang.includes('zh-TW')) || voices.find(v => v.lang.includes('zh'));
        if (v) ut.voice = v; else ut.lang = 'zh-TW';
        ut.rate = 0.9;
        ut.onend = () => setAudioState({ id: null, status: 'idle' });
        ut.onerror = () => setAudioState({ id: null, status: 'idle' });
        window.speechSynthesis.speak(ut);
      };

      // --- キー入力画面（セキュリティ対策） ---
      if (!apiKey) {
        return (
          <div className="h-screen flex items-center justify-center p-6 bg-teal-600 font-sans">
            <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center border-t-8 border-teal-500">
              <div className="text-5xl mb-4">🇹🇼</div>
              <h2 className="text-2xl font-bold text-stone-800 mb-2">Welcome Back!</h2>
              <p className="text-stone-500 text-sm mb-6 leading-relaxed">
                GitHubに公開するため、APIキーを空にしています。ご自身のキーを一度だけ入力してください。スマホに安全に保存されます。
              </p>
              <input 
                type="password"
                value={tempKey}
                onChange={(e) => setTempKey(e.target.value)}
                placeholder="AIza... で始まるAPIキー"
                className="w-full bg-stone-100 border border-stone-200 rounded-xl px-4 py-4 mb-4 outline-none focus:ring-2 focus:ring-teal-500 transition-all text-center font-mono"
              />
              <button onClick={handleKeySave} className="w-full bg-teal-600 text-white font-bold py-4 rounded-xl hover:bg-teal-700 active:scale-95 transition-all shadow-lg text-lg">
                アプリを開始する
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="flex flex-col h-screen bg-stone-50 font-sans">
          <header className="bg-teal-600 text-white p-4 shadow-md flex justify-between items-center z-10">
            <div>
              <h1 className="text-lg font-bold">台灣朋友</h1>
              <p className="text-[10px] opacity-75">HTTPS / Secure v2.0</p>
            </div>
            <button onClick={handleKeyReset} className="text-[10px] border border-teal-400 px-3 py-1.5 rounded-lg active:bg-teal-700 transition-colors">
              ログアウト
            </button>
          </header>

          {errorMessage && <div className="bg-red-500 text-white text-xs p-2 text-center fixed top-16 w-full z-20 shadow-lg">{errorMessage}</div>}

          <main className="flex-1 overflow-y-auto p-4 space-y-4 pb-24">
            {messages.map(m => (
              <div key={m.id} className={`flex ${m.role==='user'?'justify-end':'justify-start'}`}>
                <div className={`${m.role==='user'?'bg-teal-100':'bg-white border'} p-4 rounded-2xl max-w-[85%] relative shadow-sm`}>
                  {m.role==='model' && (
                    <button onClick={() => speak(m.id, m.reply)} className="absolute -right-2 -top-2 bg-white rounded-full p-2.5 shadow border text-teal-600 active:scale-90 transition-transform">
                      {audioState.id === m.id && audioState.status === 'playing' ? <VolumeIcon/> : <PlayIcon/>}
                    </button>
                  )}
                  <div className="text-lg text-stone-800 leading-relaxed">{m.role==='user' ? m.rawText : m.reply}</div>
                  <div className="text-stone-500 text-[10px] mt-1 font-mono tracking-wider">{m.role==='user' ? m.correctedPinyin : m.replyPinyin}</div>
                  {m.role==='user' && m.correctedText && (
                    <div className="text-teal-700 text-sm mt-2 border-t pt-2 border-teal-200/50 font-medium italic">
                      修正: {m.correctedText}
                    </div>
                  )}
                  {m.role==='model' && (
                    <div className="text-stone-600 text-sm mt-2 border-t pt-2 border-stone-100">
                      {m.translation}
                    </div>
                  )}
                </div>
              </div>
            ))}
            <div ref={messagesEndRef} />
          </main>

          <footer className="fixed bottom-0 w-full bg-white border-t p-3 pb-safe z-10">
            <div className="flex items-center space-x-2 max-w-4xl mx-auto">
              <button onClick={() => { if(isRecording) recognitionRef.current.stop(); else { recognitionRef.current.start(); setIsRecording(true); } }} className={`p-3.5 rounded-full shadow-sm transition-all ${isRecording?'bg-red-500 text-white animate-pulse':'bg-stone-100 text-stone-600'}`}>
                {isRecording ? <StopIcon/> : <MicIcon/>}
              </button>
              <input type="text" value={inputText} onChange={e => setInputText(e.target.value)} onKeyDown={e => e.key==='Enter'&&handleSend()} placeholder="台湾語で話そう..." className="flex-1 bg-stone-100 rounded-2xl px-5 py-3 outline-none focus:ring-2 focus:ring-teal-500/20 text-stone-800" />
              <button onClick={handleSend} disabled={!inputText.trim()||isLoading} className={`p-3.5 rounded-full transition-all ${!inputText.trim()||isLoading?'bg-teal-50 text-teal-200':'bg-teal-600 text-white shadow-md active:scale-95'}`}>
                <SendIcon/>
              </button>
            </div>
          </footer>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

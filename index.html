<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>台灣朋友AI</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; }
        #messages { height: 60vh; overflow-y: auto; border: 1px solid #ddd; padding: 10px; }
        .friend { text-align: right; color: #e74c3c; margin: 10px 0; }
        .me { text-align: left; color: #3498db; margin: 10px 0; }
        .input-area { position: sticky; bottom: 0; background: white; padding: 10px; }
        textarea { width: 70%; padding: 10px; }
        button { width: 28%; padding: 10px; background: #27ae60; color: white; border: none; }
    </style>
</head>
<body>
    <div id="messages">
        <div class="friend">今天鳥鳥天氣怎麼樣？😊 日本很冷嗎？</div>
    </div>
    
    <div class="input-area">
        <textarea id="input" placeholder="話しかけて！" rows="2"></textarea>
        <button onclick="sendMessage()">送る</button>
    </div>

    <script>
        const API_KEY = "AIzaSyBy06ukTAFccmTLHb0WAmgEzzXyuk9G3UE"; // ←ここ確認！
        
        async function sendMessage() {
            const input = document.getElementById('input');
            const btn = event.target;
            const msg = input.value.trim();
            if (!msg) return;
            
            // ユーザー発言（一番下に追加）
            document.getElementById('messages').innerHTML += 
                `<div class="me">${msg}</div>`;
            input.value = '';
            btn.disabled = true;
            btn.textContent = '送信中...';
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{parts: [{text: `台灣女性友達として、${msg}に自然に返事して。繁体字中国語＋ピンインで。親しみやすく！`}]}]
                    })
                });
                
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                
                // AI返事（一番下に追加）
                document.getElementById('messages').innerHTML += 
                    `<div class="friend">${reply}</div>`;
                    
            } catch(e) {
                document.getElementById('messages').innerHTML += 
                    `<div class="friend">あれ？エラーが出ちゃった～。もう一度試してみて！</div>`;
            }
            
            btn.disabled = false;
            btn.textContent = '送る';
            document.getElementById('messages').scrollTop = 9999;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0d9488">
  <title>台灣朋友 (Taiwan Friend) - Master Edition</title>
  
  <!-- ライブラリ読み込み -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .voice-loading { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
  </style>
</head>
<body class="bg-stone-50 overflow-hidden text-stone-800">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- アイコンコンポーネント ---
    const MicIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>;
    const StopIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/></svg>;
    const SendIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>;
    const PlayIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
    const VolumeIcon = () => <svg className="animate-pulse" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>;
    const SpinnerIcon = () => <svg className="animate-spin" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>;

    function App() {
      const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key_v3') || "");
      const [tempKey, setTempKey] = useState("");
      
      // 最初のメッセージ（完全に中国語に修正）
      const [messages, setMessages] = useState([{
        id: 1, role: 'model',
        reply: '你好！我是你的台灣朋友。我們來聊天吧！你可以用中文、日文或英文跟我說話喔。',
        replyPinyin: 'Nǐ hǎo! Wǒ shì nǐ de Táiwān péngyǒu. Wǒmen lái liáotiān ba! Nǐ kěyǐ yòng zhōngwén, rìwén huò yīngwén gēn wǒ shuōhuà ō.',
        translation: 'こんにちは！私はあなたの台湾の友達です。おしゃべりしましょう！中国語、日本語、英語で話しかけてくれていいですよ。'
      }]);
      
      const [inputText, setInputText] = useState("");
      const [isRecording, setIsRecording] = useState(false);
      const [isLoading, setIsLoading] = useState(false);
      const [audioState, setAudioState] = useState({ id: null, status: 'idle' });
      const [voiceCount, setVoiceCount] = useState(0);

      const recognitionRef = useRef(null);
      const messagesEndRef = useRef(null);

      // --- 声のリストを更新する関数 ---
      const refreshVoices = () => {
        if ('speechSynthesis' in window) {
          const v = window.speechSynthesis.getVoices();
          setVoiceCount(v.length);
          return v;
        }
        return [];
      };

      useEffect(() => {
        if ('speechSynthesis' in window) {
          refreshVoices();
          window.speechSynthesis.onvoiceschanged = refreshVoices;
          
          // Android対策：最初のタッチで「無音再生」してエンジンを叩き起こす
          const unlockAudio = () => {
            const silent = new SpeechSynthesisUtterance("");
            window.speechSynthesis.speak(silent);
            refreshVoices();
            window.removeEventListener('touchstart', unlockAudio);
          };
          window.addEventListener('touchstart', unlockAudio);
          return () => window.removeEventListener('touchstart', unlockAudio);
        }
      }, []);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages, isLoading]);

      // --- キー設定 ---
      const handleKeySave = () => {
        if (tempKey.trim().startsWith("AIza")) {
          const k = tempKey.trim();
          localStorage.setItem('gemini_api_key_v3', k);
          setApiKey(k);
        } else {
          alert("有効なAPIキーを入力してください。");
        }
      };

      const handleKeyReset = () => {
        if(confirm("APIキーを消去してログアウトしますか？")) {
          localStorage.removeItem('gemini_api_key_v3');
          setApiKey("");
        }
      };

      // --- 音声認識（マイク） ---
      useEffect(() => {
        if (apiKey && ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
          const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
          recognitionRef.current = new SpeechRecognition();
          recognitionRef.current.continuous = false;
          recognitionRef.current.lang = "zh-TW";
          recognitionRef.current.onresult = (e) => setInputText(prev => prev + e.results[0][0].transcript);
          recognitionRef.current.onend = () => setIsRecording(false);
          recognitionRef.current.onerror = () => setIsRecording(false);
        }
      }, [apiKey]);

      // --- 送信処理 ---
      const handleSend = async () => {
        if (!inputText.trim() || isLoading) return;
        const text = inputText.trim();
        const userMsg = { id: Date.now(), role: 'user', rawText: text };
        setMessages(prev => [...prev, userMsg]);
        setInputText("");
        setIsLoading(true);

        try {
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
          const sys = "あなたは台湾人の言語パートナー。繁体字で返答し、文の添削をJSON形式で返してください。";
          const payload = {
            contents: messages.filter(m => m.id !== 1).map(m => ({
              role: m.role, parts: [{ text: m.role==='user' ? m.rawText : m.reply }]
            })).concat([{ role: 'user', parts: [{ text }] }]),
            systemInstruction: { parts: [{ text: sys }] },
            generationConfig: {
              responseMimeType: "application/json",
              responseSchema: {
                type: "OBJECT",
                properties: {
                  correction: { type: "OBJECT", properties: { correctedText: {type:"STRING"}, correctedPinyin: {type:"STRING"} } },
                  reply: { type: "OBJECT", properties: { reply: {type:"STRING"}, replyPinyin: {type:"STRING"}, translation: {type:"STRING"} } }
                }
              }
            }
          };
          const r = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
          const d = await r.json();
          const res = JSON.parse(d.candidates[0].content.parts[0].text);
          setMessages(prev => prev.map(m => m.id === userMsg.id ? {...m, ...res.correction} : m));
          setMessages(prev => [...prev, { id: Date.now()+1, role: 'model', ...res.reply }]);
        } catch (e) {
          alert("通信エラーが発生しました。");
          setMessages(prev => prev.filter(m => m.id !== userMsg.id));
          setInputText(text);
        } finally {
          setIsLoading(false);
        }
      };

      // --- 音声再生（スピーカー） ---
      const speak = (msgId, text) => {
        if (!('speechSynthesis' in window)) return;
        
        window.speechSynthesis.cancel();
        window.speechSynthesis.resume(); 

        if (audioState.id === msgId && audioState.status === 'playing') {
          setAudioState({ id: null, status: 'idle' });
          return;
        }

        // アイコンを「砂時計」に
        setAudioState({ id: msgId, status: 'loading' });

        const voices = refreshVoices();
        
        // 音声リストが空なら強制的に再試行
        if (voices.length === 0) {
          window.speechSynthesis.speak(new SpeechSynthesisUtterance("")); // 叩き起こし
          setTimeout(() => {
            const v2 = refreshVoices();
            if (v2.length > 0) speak(msgId, text); // リストが取れたら再試行
            else setAudioState({ id: null, status: 'idle' });
          }, 500);
          return;
        }

        const ut = new SpeechSynthesisUtterance(text);
        const targetVoice = voices.find(v => v.lang.includes('zh-TW')) || 
                            voices.find(v => v.lang.includes('zh-')) || 
                            voices.find(v => v.lang.includes('ja'));

        if (targetVoice) ut.voice = targetVoice; else ut.lang = 'zh-TW';
        
        ut.rate = 0.9;
        ut.onstart = () => setAudioState({ id: msgId, status: 'playing' });
        ut.onend = () => setAudioState({ id: null, status: 'idle' });
        ut.onerror = () => setAudioState({ id: null, status: 'idle' });
        
        window.speechSynthesis.speak(ut);
      };

      // ログイン画面
      if (!apiKey) {
        return (
          <div className="h-screen flex items-center justify-center p-6 bg-teal-600 font-sans text-stone-800">
            <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center">
              <div className="text-5xl mb-4">🇹🇼</div>
              <h2 className="text-2xl font-bold mb-2">Welcome!</h2>
              <p className="text-stone-500 text-sm mb-6 leading-relaxed">APIキーを入力してください。<br/>あなたのスマホにのみ保存されます。</p>
              <input type="password" value={tempKey} onChange={(e) => setTempKey(e.target.value)} placeholder="AIza... APIキー" className="w-full bg-stone-100 border border-stone-200 rounded-xl px-4 py-4 mb-4 text-center font-mono outline-none focus:ring-2 focus:ring-teal-500" />
              <button onClick={handleKeySave} className="w-full bg-teal-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all">開始</button>
            </div>
          </div>
        );
      }

      return (
        <div className="flex flex-col h-[100dvh] bg-stone-50 font-sans overflow-hidden">
          {/* ヘッダー */}
          <header className="bg-teal-600 text-white p-4 shadow-md flex justify-between items-center z-20 shrink-0">
            <div>
              <h1 className="text-lg font-bold">台灣朋友</h1>
              <p className="text-[9px] opacity-75 uppercase">Master v2026.03.12-0515</p>
            </div>
            <button onClick={handleKeyReset} className="text-[10px] border border-teal-400 px-3 py-1.5 rounded-lg active:bg-teal-700">Key変更</button>
          </header>

          {/* メッセージエリア */}
          <main className="flex-1 overflow-y-auto p-4 space-y-4 bg-stone-50">
            {messages.map(m => (
              <div key={m.id} className={`flex ${m.role==='user'?'justify-end':'justify-start'}`}>
                <div className={`${m.role==='user'?'bg-teal-100 text-teal-900 shadow-sm':'bg-white border shadow-sm text-stone-800'} p-4 rounded-2xl max-w-[85%] relative`}>
                  {m.role==='model' && (
                    <button onClick={() => speak(m.id, m.reply)} className="absolute -right-2 -top-2 bg-white rounded-full p-2.5 shadow-md border text-teal-600 active:scale-90 transition-transform">
                      {audioState.id === m.id ? (audioState.status === 'playing' ? <VolumeIcon/> : <SpinnerIcon/>) : <PlayIcon/>}
                    </button>
                  )}
                  <div className="text-lg leading-relaxed">{m.role==='user' ? m.rawText : m.reply}</div>
                  <div className="text-stone-Stone text-[10px] mt-1 font-mono tracking-wider">{m.role==='user' ? m.correctedPinyin : m.replyPinyin}</div>
                  {m.role==='user' && m.correctedText && <div className="text-teal-700 text-sm mt-2 border-t pt-2 border-teal-200 font-medium italic">修正: {m.correctedText}</div>}
                  {m.role==='model' && <div className="text-stone-600 text-sm mt-2 border-t pt-2 border-stone-100">{m.translation}</div>}
                </div>
              </div>
            ))}
            <div ref={messagesEndRef} />
          </main>

          {/* フッター */}
          <footer className="bg-white border-t p-3 pb-safe z-20 shrink-0 shadow-[0_-4px_10px_rgba(0,0,0,0.03)]">
            <div className="flex items-center space-x-2 max-w-4xl mx-auto">
              <button onClick={() => { if(isRecording) recognitionRef.current.stop(); else { recognitionRef.current.start(); setIsRecording(true); } }} className={`p-3.5 rounded-full shadow-sm shrink-0 ${isRecording?'bg-red-500 text-white animate-pulse':'bg-stone-100 text-stone-600'}`}>
                {isRecording ? <StopIcon/> : <MicIcon/>}
              </button>
              
              <div className="flex-1 bg-stone-100 rounded-2xl px-4 py-1 flex items-center min-h-[44px]">
                <textarea 
                  rows="1"
                  value={inputText} 
                  onChange={e => setInputText(e.target.value)} 
                  placeholder="台湾語で話そう..." 
                  className="w-full bg-transparent py-2 outline-none text-stone-800 resize-none max-h-32 text-base leading-tight"
                />
              </div>

              <button onClick={handleSend} disabled={!inputText.trim()||isLoading} className={`p-3.5 rounded-full shrink-0 transition-all ${!inputText.trim()||isLoading?'bg-teal-50 text-teal-200':'bg-teal-600 text-white shadow-md active:scale-95'}`}>
                {isLoading ? <SpinnerIcon/> : <SendIcon/>}
              </button>
            </div>
            
            <div className="flex justify-center items-center space-x-2 text-[8px] text-stone-400 mt-2 font-mono">
              <span className={voiceCount === 0 ? "text-red-400 font-bold voice-loading" : "text-teal-500"}>
                Voices: {voiceCount}
              </span>
              <span>|</span>
              <span>v2026.03.12-0515</span>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
<!-- v2026.03.12-0515 -->

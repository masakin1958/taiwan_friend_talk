<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>台灣朋友AI - Grok版</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; }
        #messages { height: 60vh; overflow-y: auto; border: 1px solid #ddd; padding: 10px; }
        .friend { text-align: right; color: #e74c3c; margin: 10px 0; }
        .me { text-align: left; color: #3498db; margin: 10px 0; }
        .input-area { position: sticky; bottom: 0; background: white; padding: 10px; }
        textarea { width: 70%; padding: 10px; }
        button { width: 28%; padding: 10px; background: #27ae60; color: white; border: none; }
        .pinyin { font-size: 0.8em; color: #666; }
    </style>
</head>
<body>
    <div id="messages">
        <div class="friend">今天鳥鳥天氣怎麼樣？<br><span class="pinyin">Jīntiān niǎo niǎo tiānqì zěnmeyàng?</span></div>
    </div>
    
    <div class="input-area">
        <textarea id="input" placeholder="話しかけて！" rows="2"></textarea>
        <button onclick="sendMessage()">送る</button>
    </div>

    <script>
        const API_KEY = "xai-v4X0TczSPhXQNSbjo8c0DwoVSQgPYL2qDtDYBpeZwJunByjxmpBRRwq87tU9GKMho43CllWuNT7svvLz"; // console.x.ai で取得！
        
        async function sendMessage() {
            const input = document.getElementById('input');
            const btn = document.querySelector('button');
            const msg = input.value.trim();
            if (!msg) return;
            
            // ユーザー発言（左）
            document.getElementById('messages').innerHTML += `<div class="me">${msg}</div>`;
            input.value = '';
            btn.textContent = '送信中...';
            
            try {
                const res = await fetch('https://api.x.ai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'grok-beta',
                        messages: [{role: 'user', content: `台灣女性友達として自然に返事して。中国語で：${msg}`}],

                    })
                });
                
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                
                const data = await res.json();
                const reply = data.choices[0].message.content;
                
                // AI返事（右）
                document.getElementById('messages').innerHTML += `<div class="friend">${reply}</div>`;
                    
            } catch(e) {
                document.getElementById('messages').innerHTML += 
                    `<div class="friend">哎呀～網路小問題，再試一次吧！😅</div>`;
            }
            
            btn.textContent = '送る';
            document.getElementById('messages').scrollTop = 9999;
        }
    </script>
</body>
</html>

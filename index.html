<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>台灣朋友 (Taiwan Friend) - Master Edition</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { -webkit-tap-highlight-color: transparent; }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .debug-pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
  </style>
</head>
<body class="bg-stone-50 overflow-hidden text-stone-800">
  <div id="root"></div>

  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useRef } = React;

    const MicIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>;
    const StopIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/></svg>;
    const SendIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>;
    const PlayIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
    const VolumeIcon = () => <svg className="animate-pulse" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>;

    function App() {
      const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key_v3') || "");
      const [tempKey, setTempKey] = useState("");
      const [messages, setMessages] = useState([{
        id: 1, role: 'model',
        reply: '你好！我是你的台灣朋友。我們来聊天吧！你可以用中文、日文或英文跟我說話喔。',
        replyPinyin: 'Nǐ hǎo! Wǒ shì nǐ de Táiwān péngyǒu. Wǒmen lái liáotiān ba! Nǐ kěyǐ yòng zhōngwén, rìwén huò yīngwén gēn wǒ shuōhuà ō.',
        translation: 'こんにちは！私はあなたの台湾の友達です。おしゃべりしましょう！中国語、日本語、英語で話しかけてくれていいですよ。'
      }]);
      const [inputText, setInputText] = useState("");
      const [isRecording, setIsRecording] = useState(false);
      const [isLoading, setIsLoading] = useState(false);
      const [errorMessage, setErrorMessage] = useState("");
      const [audioState, setAudioState] = useState({ id: null, status: 'idle' });
      const [voiceCount, setVoiceCount] = useState(0);

      const recognitionRef = useRef(null);
      const messagesEndRef = useRef(null);

      // --- 声のリストを読み込む関数 ---
      const loadVoices = () => {
        if ('speechSynthesis' in window) {
          const v = window.speechSynthesis.getVoices();
          setVoiceCount(v.length);
        }
      };

      useEffect(() => {
        if ('speechSynthesis' in window) {
          loadVoices();
          window.speechSynthesis.onvoiceschanged = loadVoices;
          
          // 初回タップ時に音声を叩き起こすイベント
          const wakeUpAudio = () => {
            const ut = new SpeechSynthesisUtterance("");
            window.speechSynthesis.speak(ut);
            loadVoices();
            window.removeEventListener('click', wakeUpAudio);
            window.removeEventListener('touchstart', wakeUpAudio);
          };
          window.addEventListener('click', wakeUpAudio);
          window.addEventListener('touchstart', wakeUpAudio);
          
          return () => {
            window.removeEventListener('click', wakeUpAudio);
            window.removeEventListener('touchstart', wakeUpAudio);
          };
        }
      }, []);

      const handleKeySave = () => {
        if (tempKey.trim().startsWith("AIza")) {
          const key = tempKey.trim();
          localStorage.setItem('gemini_api_key_v3', key);
          setApiKey(key);
        } else {
          showError("有効なAPIキーを入力してください。");
        }
      };

      const handleKeyReset = () => {
        if(confirm("APIキーをリセットしますか？")) {
          localStorage.removeItem('gemini_api_key_v3');
          setApiKey("");
        }
      };

      useEffect(() => {
        if (apiKey && ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
          const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
          recognitionRef.current = new SpeechRecognition();
          recognitionRef.current.continuous = false;
          recognitionRef.current.lang = "zh-TW";
          recognitionRef.current.onresult = (e) => setInputText(prev => prev + e.results[0][0].transcript);
          recognitionRef.current.onend = () => setIsRecording(false);
          recognitionRef.current.onerror = () => setIsRecording(false);
        }
      }, [apiKey]);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages, isLoading]);

      const showError = (msg) => {
        setErrorMessage(msg);
        setTimeout(() => setErrorMessage(""), 5000);
      };

      const handleSend = async () => {
        if (!inputText.trim() || isLoading) return;
        const text = inputText.trim();
        const userMsg = { id: Date.now(), role: 'user', rawText: text };
        setMessages(prev => [...prev, userMsg]);
        setInputText("");
        setIsLoading(true);

        try {
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
          const sys = "あなたは台湾人の言語パートナー。繁体字で返答し、文の添削をJSON形式で返してください。";
          const payload = {
            contents: messages.filter(m => m.id !== 1).map(m => ({
              role: m.role, parts: [{ text: m.role==='user' ? m.rawText : m.reply }]
            })).concat([{ role: 'user', parts: [{ text }] }]),
            systemInstruction: { parts: [{ text: sys }] },
            generationConfig: {
              responseMimeType: "application/json",
              responseSchema: {
                type: "OBJECT",
                properties: {
                  correction: { type: "OBJECT", properties: { correctedText: {type:"STRING"}, correctedPinyin: {type:"STRING"} } },
                  reply: { type: "OBJECT", properties: { reply: {type:"STRING"}, replyPinyin: {type:"STRING"}, translation: {type:"STRING"} } }
                }
              }
            }
          };
          const r = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
          const d = await r.json();
          const res = JSON.parse(d.candidates[0].content.parts[0].text);
          setMessages(prev => prev.map(m => m.id === userMsg.id ? {...m, ...res.correction} : m));
          setMessages(prev => [...prev, { id: Date.now()+1, role: 'model', ...res.reply }]);
        } catch (e) {
          showError("通信エラーが発生しました。");
          setMessages(prev => prev.filter(m => m.id !== userMsg.id));
          setInputText(text);
        } finally {
          setIsLoading(false);
        }
      };

      const speak = (msgId, text) => {
        if (!('speechSynthesis' in window)) return;
        
        window.speechSynthesis.cancel();
        window.speechSynthesis.resume(); 

        if (audioState.id === msgId && audioState.status === 'playing') {
          return setAudioState({ id: null, status: 'idle' });
        }

        const voices = window.speechSynthesis.getVoices();
        if (voices.length === 0) {
          showError("音声の準備ができていません。もう一度試すか、画面をタップしてください。");
          loadVoices();
          return;
        }

        setAudioState({ id: msgId, status: 'playing' });
        const utterance = new SpeechSynthesisUtterance(text);
        
        const targetVoice = voices.find(v => v.lang.includes('zh-TW')) || 
                            voices.find(v => v.lang.includes('zh-')) || 
                            voices.find(v => v.lang.includes('ja'));

        if (targetVoice) utterance.voice = targetVoice; else utterance.lang = 'zh-TW';
        
        utterance.rate = 0.9;
        utterance.onend = () => setAudioState({ id: null, status: 'idle' });
        utterance.onerror = () => setAudioState({ id: null, status: 'idle' });
        
        window.speechSynthesis.speak(utterance);
      };

      if (!apiKey) {
        return (
          <div className="h-screen flex items-center justify-center p-6 bg-teal-600 font-sans">
            <div className="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center border-t-8 border-teal-500">
              <div className="text-5xl mb-4">🇹🇼</div>
              <h2 className="text-2xl font-bold text-stone-800 mb-2">Welcome!</h2>
              <p className="text-stone-500 text-sm mb-6 leading-relaxed">
                APIキーを入力してください。スマホにのみ安全に保存されます。
              </p>
              <input type="password" value={tempKey} onChange={(e) => setTempKey(e.target.value)} placeholder="AIza... APIキー" className="w-full bg-stone-100 border border-stone-200 rounded-xl px-4 py-4 mb-4 outline-none focus:ring-2 focus:ring-teal-500 transition-all text-center font-mono" />
              <button onClick={handleKeySave} className="w-full bg-teal-600 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-all">
                チャットを開始
              </button>
            </div>
          </div>
        );
      }

      return (
        <div className="flex flex-col h-screen bg-stone-50 font-sans">
          <header className="bg-teal-600 text-white p-4 shadow-md flex justify-between items-center z-10">
            <div>
              <h1 className="text-lg font-bold leading-tight">台灣朋友</h1>
              <p className="text-[10px] opacity-75 uppercase tracking-widest">Master Edition</p>
            </div>
            <button onClick={handleKeyReset} className="text-[10px] border border-teal-400 px-3 py-1.5 rounded-lg active:bg-teal-700 text-teal-50">
              Key変更
            </button>
          </header>

          <main className="flex-1 overflow-y-auto p-4 space-y-4 pb-24">
            {messages.map(m => (
              <div key={m.id} className={`flex ${m.role==='user'?'justify-end':'justify-start'}`}>
                <div className={`${m.role==='user'?'bg-teal-100 shadow-sm text-teal-900':'bg-white border shadow-sm text-stone-800'} p-4 rounded-2xl max-w-[85%] relative`}>
                  {m.role==='model' && (
                    <button onClick={() => speak(m.id, m.reply)} className="absolute -right-2 -top-2 bg-white rounded-full p-2.5 shadow-md border text-teal-600 active:scale-90 transition-transform">
                      {audioState.id === m.id && audioState.status === 'playing' ? <VolumeIcon/> : <PlayIcon/>}
                    </button>
                  )}
                  <div className="text-lg leading-relaxed">{m.role==='user' ? m.rawText : m.reply}</div>
                  <div className="text-stone-500 text-[10px] mt-1 font-mono tracking-wider">{m.role==='user' ? m.correctedPinyin : m.replyPinyin}</div>
                  {m.role==='user' && m.correctedText && <div className="text-teal-700 text-sm mt-2 border-t pt-2 border-teal-200 font-medium italic">修正: {m.correctedText}</div>}
                  {m.role==='model' && <div className="text-stone-600 text-sm mt-2 border-t pt-2 border-stone-100">{m.translation}</div>}
                </div>
              </div>
            ))}
            <div ref={messagesEndRef} />
          </main>

          <footer className="fixed bottom-0 w-full bg-white border-t p-3 pb-safe z-10 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
            <div className="flex items-center space-x-2 max-w-4xl mx-auto">
              <button onClick={() => { if(isRecording) recognitionRef.current.stop(); else { recognitionRef.current.start(); setIsRecording(true); } }} className={`p-3.5 rounded-full shadow-sm ${isRecording?'bg-red-500 text-white animate-pulse':'bg-stone-100 text-stone-600'}`}>
                {isRecording ? <StopIcon/> : <MicIcon/>}
              </button>
              <input type="text" value={inputText} onChange={e => setInputText(e.target.value)} onKeyDown={e => e.key==='Enter'&&handleSend()} placeholder="台湾語で話そう..." className="flex-1 bg-stone-100 rounded-2xl px-5 py-3 outline-none focus:ring-2 focus:ring-teal-500/20 text-stone-800" />
              <button onClick={handleSend} disabled={!inputText.trim()||isLoading} className={`p-3.5 rounded-full transition-all ${!inputText.trim()||isLoading?'bg-teal-50 text-teal-200':'bg-teal-600 text-white shadow-md'}`}>
                <SendIcon/>
              </button>
            </div>
            
            {/* デバッグ用ブロック (復活) */}
            <div className="flex justify-center items-center space-x-2 text-[8px] text-stone-400 mt-2 font-mono border-t pt-1 border-stone-100">
              <span className={voiceCount === 0 ? "text-red-400 font-bold debug-pulse" : "text-teal-600"}>
                Voices: {voiceCount}
              </span>
              <span>|</span>
              <span>v2026.03.12-0255</span>
            </div>
          </footer>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

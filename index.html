<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>台灣朋友AI</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; }
        #messages { height: 60vh; overflow-y: auto; border: 1px solid #ddd; padding: 10px; }
        .friend { text-align: right; color: #e74c3c; margin: 10px 0; }
        .me { text-align: left; color: #3498db; margin: 10px 0; }
        .input-area { position: sticky; bottom: 0; background: white; padding: 10px; }
        textarea { width: 70%; padding: 10px; }
        button { width: 28%; padding: 10px; background: #27ae60; color: white; border: none; }
        .pinyin { font-size: 0.8em; color: #666; }
    </style>
</head>
<body>
    <div id="messages">
        <div class="friend">今天鳥鳥天氣怎麼樣？<br><span class="pinyin">Jīntiān niǎo niǎo tiānqì zěnmeyàng?</span></div>
    </div>
    
    <div class="input-area">
        <textarea id="input" placeholder="話しかけて！" rows="2"></textarea>
        <button onclick="sendMessage()">送る</button>
    </div>

    <script>
        const API_KEY = "AIzaSyBy06ukTAFccmTLHb0WAmgEzzXyuk9G3UE"; // ←君のキー確認！
        
        async function sendMessage() {
            const input = document.getElementById('input');
            const btn = document.querySelector('button');
            const msg = input.value.trim();
            if (!msg) return;
            
            // ユーザー発言
            document.getElementById('messages').innerHTML += `<div class="me">${msg}</div>`;
            input.value = '';
            btn.textContent = '送信中...';
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{parts: [{text: `台灣女性友達として自然に返事して。中国語＋ピンインで。${msg}`}]}]
                    })
                });
                
                if (!res.ok) throw new Error('API error');
                
                const data = await res.json();
                const reply = data.candidates[0].content.parts[0].text;
                
                // AI返事＋ピンイン
                document.getElementById('messages').innerHTML += 
                    `<div class="friend">${reply}<br><span class="pinyin">Pīnyīn...</span></div>`;
                    
            } catch(e) {
                document.getElementById('messages').innerHTML += 
                    `<div class="friend">網路小問題，再試一次吧！😅</div>`;
            }
            
            btn.textContent = '送る';
            document.getElementById('messages').scrollTop = 9999;
        }
    </script>
</body>
</html>
